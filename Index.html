<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Translate</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="card">
  <div class="lang-bar">
    <select id="source">
      <option>Detect Language</option>
      <option>English</option>
      <option>French</option>
    </select>
    <select id="target">
      <option>English</option>
      <option selected>French</option>
    </select>
    <button class="swap" id="swap" aria-label="swap">⇄</button>
  </div>

  <div class="grid">
    <div class="pane">
      <span class="label">Input</span>
      <textarea id="inputText" maxlength="500">Hello, how are you</textarea>
      <div class="footer">
        <button id="listenIn">🔊 Listen</button>
        <button id="copyIn">📋 Copy</button>
        <span id="count">18/500</span>
      </div>
    </div>
    <div class="pane">
      <span class="label">Output</span>
      <textarea id="outputText" readonly></textarea>
      <textarea>Bonjour, comment allez-vous</textarea>
      <div class="footer">
        <button id="listenOut">🔊 Listen</button>
        <button id="copyOut">📋 Copy</button>
      </div>
    </div>
  </div>

  <button class="primary" id="translateBtn">Translate</button>
</div>

<script src="script.js"></script>
</body>
</html>
